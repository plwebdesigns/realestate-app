name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, ctype, fileinfo, json, tokenizer, xml, dom
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run tests
        run: php artisan test --compact
